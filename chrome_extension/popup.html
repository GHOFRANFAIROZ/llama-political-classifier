<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <title>راصد المحتوى التحريضي الذكي</title>

  <!-- خط Amiri محلي لمنع مشاكل CSP -->
  <style>
    
    :root {
      --bg-main: #0f0b1e;
      --bg-card: #1a1333;
      --border: rgba(255, 255, 255, 0.12);
      --text: #f2f0fa;
      --muted: #b9b4d8;
      --accent: #7b5cff;
      --accent-soft: #5e46c8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 320px;
      height: 320px;
      background: linear-gradient(180deg, #0c0818, #140e2b);
      color: var(--text);
      overflow: hidden;
    }

    .wrap {
      padding: 14px;
    }

    .header {
      text-align: center;
      margin-bottom: 10px;
    }

    .header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      transition: box-shadow 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 0 18px rgba(123, 92, 255, 0.12);
    }

    textarea {
      width: 100%;
      height: 56px;
      resize: none;
      background: #0f0b1e;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      outline: none;
      direction: rtl;
      text-align: right;
      transition: border 0.25s ease, box-shadow 0.25s ease;
    }

    textarea::placeholder {
      color: #8e88b8;
      font-size: 13px;
    }

    textarea:hover,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(123, 92, 255, 0.22);
    }

    textarea:focus {
      direction: ltr;
      text-align: left;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      border: none;
      border-radius: 10px;
      padding: 6px 0;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn-secondary:hover {
      color: #ffffff;
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(123, 92, 255, 0.25);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      color: #ffffff;
    }

    .btn-primary:hover {
      box-shadow: 0 0 14px rgba(123, 92, 255, 0.45), 0 0 22px rgba(94, 70, 200, 0.35);
      transform: translateY(-1px);
    }

    .status {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-align: center;
      min-height: 18px;
    }

    .status.ok {
      color: #8affc1;
    }

    .status.bad {
      color: #ff9aa5;
    }

    .note {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px dashed rgba(255, 255, 255, 0.14);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      display: none;
      background: rgba(15, 11, 30, 0.6);
    }

    .context-wrap {
      margin-top: 10px;
      display: none;
    }

    .context-label {
      font-size: 12px;
      color: var(--muted);
      margin: 0 0 6px 0;
      font-weight: 700;
    }

    #contextText {
      height: 62px;
    }

    .context-actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }

    .btn-retry {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: #ffffff;
    }

    .btn-retry:hover {
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(123, 92, 255, 0.25);
      transform: translateY(-1px);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <h1>راصد المحتوى التحريضي الذكي</h1>
    </div>

    <div class="card">
      <textarea id="postUrl" placeholder="رابط المنشور..."></textarea>

      <div class="row">
        <button id="fillBtn" class="btn-secondary">من الصفحة</button>
        <button id="btn" class="btn-primary">فحص فوري</button>
      </div>

      <div id="result" class="status"></div>

      <div id="lowConfNote" class="note"></div>

      <div id="contextWrap" class="context-wrap">
        <p class="context-label">سياق اختياري (سطر/سطرين) لتحسين الدقة:</p>
        <textarea id="contextText"
          placeholder="مثال: المنشور ساخر / اقتباس من خبر / رد على صورة أو نقاش سابق"></textarea>

        <div class="context-actions">
          <button id="reclassifyBtn" class="btn-retry">إعادة التصنيف مع السياق</button>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>

</html>
