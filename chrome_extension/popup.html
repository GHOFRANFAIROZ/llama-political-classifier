<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>AI Post Classifier</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            width: 250px;
            padding: 15px;
        }
        textarea {
            width: 100%;
            height: 80px;
        }
        button {
            margin-top: 10px;
            width: 100%;
        }
        #result {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h3>Classify This Post</h3>
    <textarea id="postText" placeholder="Paste post text here..."></textarea>
    <button id="classifyBtn">Classify</button>
    <div id="result"></div>
    <script src="popup.js"></script>
</body>
</html>
